name: distributed-observability

x-sample-build: &sample-build
  context: ./sample-services
  dockerfile: Dockerfile

x-sample-env: &sample-env
  OTEL_SERVICE_NAMESPACE: sample-commerce
  DEPLOYMENT_ENVIRONMENT: local
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
  LOG_LEVEL: info

x-sample-service: &sample-service
  build: *sample-build
  restart: unless-stopped
  networks:
    - sample-app
    - observability
  labels:
    observability.stack: distributed-observability
  depends_on:
    otel-collector:
      condition: service_started
  deploy:
    resources:
      limits:
        cpus: "0.50"
        memory: 256M
      reservations:
        memory: 128M

services:
  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_STRICT_TRANSPORT_SECURITY: "true"
      GF_SECURITY_CONTENT_SECURITY_POLICY: "true"
      GF_SECURITY_X_CONTENT_TYPE_OPTIONS: "true"
      GF_SECURITY_X_XSS_PROTECTION: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_LOG_LEVEL: warn
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - observability
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --storage.tsdb.retention.size=5GB
      - --storage.tsdb.wal-compression
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
    volumes:
      - prometheus-data:/prometheus
      - ./config/prometheus:/etc/prometheus:ro
    networks:
      - observability
    depends_on:
      alertmanager:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 512M

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --data.retention=120h
    volumes:
      - alertmanager-data:/alertmanager
      - ./config/alertmanager:/etc/alertmanager:ro
    networks:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 64M

  loki:
    image: grafana/loki:3.2.1
    container_name: loki
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/loki.yml
    volumes:
      - loki-data:/loki
      - ./config/loki/loki.yml:/etc/loki/loki.yml:ro
    networks:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M

  promtail:
    image: grafana/promtail:3.2.1
    container_name: promtail
    restart: unless-stopped
    command:
      - -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./config/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-positions:/tmp
    networks:
      - observability
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:9080/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          memory: 64M

  tempo:
    image: grafana/tempo:2.6.1
    container_name: tempo
    restart: unless-stopped
    command:
      - -config.file=/etc/tempo/tempo.yml
    volumes:
      - tempo-data:/var/tempo
      - ./config/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
    networks:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3200/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    container_name: otel-collector
    restart: unless-stopped
    command:
      - --config=/etc/otelcol-contrib/config.yml
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./config/otel-collector/config.yml:/etc/otelcol-contrib/config.yml:ro
    networks:
      - observability
    depends_on:
      tempo:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /:/host:ro,rslave
    networks:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:9100/metrics || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 32M

  frontend:
    <<: *sample-service
    command: uvicorn services.frontend:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    environment:
      <<: *sample-env
      SERVICE_NAME: frontend
      ORDERS_URL: http://orders:8080
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2)"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s

  orders:
    <<: *sample-service
    command: uvicorn services.orders:app --host 0.0.0.0 --port 8080
    environment:
      <<: *sample-env
      SERVICE_NAME: orders
      INVENTORY_URL: http://inventory:8080
      PAYMENTS_URL: http://payments:8080
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2)"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s

  inventory:
    <<: *sample-service
    command: uvicorn services.inventory:app --host 0.0.0.0 --port 8080
    environment:
      <<: *sample-env
      SERVICE_NAME: inventory
      INVENTORY_LOW_STOCK_RATE: ${INVENTORY_LOW_STOCK_RATE:-0.10}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2)"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s

  payments:
    <<: *sample-service
    command: uvicorn services.payments:app --host 0.0.0.0 --port 8080
    environment:
      <<: *sample-env
      SERVICE_NAME: payments
      PAYMENT_FAILURE_RATE: ${PAYMENT_FAILURE_RATE:-0.08}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2)"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s

  load-generator:
    build: *sample-build
    command: python -m services.load_generator
    restart: unless-stopped
    environment:
      <<: *sample-env
      SERVICE_NAME: load-generator
      FRONTEND_URL: http://frontend:8080
      REQUEST_INTERVAL_SECONDS: ${REQUEST_INTERVAL_SECONDS:-0.75}
    networks:
      - sample-app
      - observability
    depends_on:
      frontend:
        condition: service_healthy

volumes:
  grafana-data:
  prometheus-data:
  alertmanager-data:
  loki-data:
  tempo-data:
  promtail-positions:

networks:
  observability:
    name: observability-net
  sample-app:
    name: distributed-sample-net
