server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yml
  sync_period: 10s

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: ""
    batchwait: 1s
    batchsize: 1048576
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=distributed-observability"]
    relabel_configs:
      - source_labels:
          - __meta_docker_container_label_com_docker_compose_project
        target_label: compose_project
      - source_labels:
          - __meta_docker_container_label_com_docker_compose_service
        target_label: service
      - source_labels:
          - __meta_docker_container_name
        regex: /(.+)
        target_label: container
      - source_labels:
          - __meta_docker_container_log_stream
        target_label: stream
      - source_labels:
          - __meta_docker_container_label_observability_stack
        target_label: observability_stack
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            level: level
            trace_id: trace_id
            service_name: service
      - labels:
          level:
          trace_id:
      - drop:
          source: level
          expression: "debug"
      - timestamp:
          source: timestamp
          format: "2006-01-02T15:04:05Z07:00"
          fallback_formats:
            - "2006-01-02T15:04:05"
